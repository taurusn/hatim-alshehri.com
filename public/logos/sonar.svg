<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>Sonar</title>
  <circle cx="16" cy="16" r="3" fill="#00d4aa"/>
  <circle cx="16" cy="16" r="3" stroke="#00d4aa" stroke-width="2.2" fill="none" opacity="0">
    <animate attributeName="r" from="3" to="14" dur="2s" begin="0s" repeatCount="indefinite"
             calcMode="spline" keySplines="0.2 0 0.4 1"/>
    <animate attributeName="opacity" values="0;0.8;0" keyTimes="0;0.1;1"
             dur="2s" begin="0s" repeatCount="indefinite"
             calcMode="spline" keySplines="0.4 0 0.2 1;0.2 0 0.6 1"/>
    <animate attributeName="stroke-width" values="2.2;0.9" dur="2s" begin="0s" repeatCount="indefinite"
             calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </circle>
  <circle cx="16" cy="16" r="3" stroke="#00d4aa" stroke-width="2" fill="none" opacity="0">
    <animate attributeName="r" from="3" to="14" dur="2s" begin="1s" repeatCount="indefinite"
             calcMode="spline" keySplines="0.2 0 0.4 1"/>
    <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.1;1"
             dur="2s" begin="1s" repeatCount="indefinite"
             calcMode="spline" keySplines="0.4 0 0.2 1;0.2 0 0.6 1"/>
    <animate attributeName="stroke-width" values="2;0.7" dur="2s" begin="1s" repeatCount="indefinite"
             calcMode="spline" keySplines="0.4 0 0.2 1"/>
  </circle>
</svg>
